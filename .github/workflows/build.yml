name: Build mot⁹ APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create assets directory
        run: mkdir -p assets/images

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug --split-per-abi

      - name: Upload APK ARM (debug)
        uses: actions/upload-artifact@v4
        with:
          name: mot9-tv-arm-debug
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk
          retention-days: 30

      - name: Upload APK ARM64 (debug)
        uses: actions/upload-artifact@v4
        with:
          name: mot9-tv-arm64-debug
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk
          retention-days: 30
